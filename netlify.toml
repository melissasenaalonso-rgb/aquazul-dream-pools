# ============================================================
# AQUAZUL PISCINAS — netlify.toml v2 (corrigido 2026-03-16)
# NOTA: Os security headers foram movidos para public/_headers
#       (mais confiável para CSP longo). Este arquivo cuida
#       apenas do build e redirects.
# ============================================================

[build]
  publish = "dist"
  command = "npm run build"

# Forçar HTTPS — redirecionar HTTP para HTTPS
[[redirects]]
  from   = "http://aquazulpiscinas.com.br/*"
  to     = "https://aquazulpiscinas.com.br/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.aquazulpiscinas.com.br/*"
  to     = "https://aquazulpiscinas.com.br/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.aquazulpiscinas.com.br/*"
  to     = "https://aquazulpiscinas.com.br/:splat"
  status = 301
  force  = true

# SPA fallback — necessário para React Router
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache de assets com hash (JS/CSS gerados pelo Vite)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
